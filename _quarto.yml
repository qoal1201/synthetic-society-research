project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - field-map.qmd
    - glossary.qmd
    - reading-list.qmd
    - experiments/
    - paper-reviews/
    - foundations/

website:
  title: "합성사회 연구 노트"
  description: "인간과 AI가 상호작용하는 합성사회를 공부하고 기록하는 공간."
  site-url: https://qoal1201.github.io/synthetic-society-research/
  image: images/field-map-terrain.png
  open-graph: true
  twitter-card: true
  navbar:
    left:
      - text: "ML 기초"
        href: foundations/index.qmd
      - text: "용어집"
        href: glossary.qmd
    right:
      - icon: github
        href: https://github.com/qoal1201/synthetic-society-research

lang: ko

language:
  toc-title-website: "이 페이지에서"
  search-text-placeholder: "검색"
  title-block-modified: "최종 갱신"

format:
  html:
    theme:
      light: [flatly, theme-light.scss]
      dark: [darkly, theme-dark.scss]
    mermaid:
      theme: neutral
    toc: true
    code-copy: true
    css: styles.css
