project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - field-map.qmd
    - clonie-comparison.qmd
    - glossary.qmd
    - open-questions.qmd
    - reading-list.qmd
    - research-log/
    - "!research-log/index.qmd"
    - paper-reviews/
    - foundations/

website:
  title: "Synthetic Society Research"
  description: "인간과 AI가 상호작용하는 합성사회를 공부하고 기록하는 공간."
  site-url: https://qoal1201.github.io/synthetic-society-research/
  image: images/field-map-terrain.png
  open-graph: true
  twitter-card: true
  navbar:
    left:
      - text: "일지"
        href: index.qmd
      - text: "논문 리뷰"
        href: paper-reviews/index.qmd
      - text: "질문"
        href: open-questions.qmd
      - text: "클로니 대조"
        href: clonie-comparison.qmd
      - text: "ML 기초"
        href: foundations/index.qmd
      - text: "용어집"
        href: glossary.qmd
    right:
      - icon: github
        href: https://github.com/qoal1201/synthetic-society-research

format:
  html:
    theme:
      light: flatly
      dark: darkly
    mermaid:
      theme: neutral
    toc: true
    code-copy: true
    css: styles.css
